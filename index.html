<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #121212; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        #bg-canvas { position: absolute; top: 0; left: 0; z-index: 0; }

        .container { position: relative; z-index: 1; padding: 20px; height: 100vh; }
        
        .content { 
            position: absolute; 
            top: 20px; left: 20px; width: calc(100% - 40px);
            /* ЗАМЕДЛЕННАЯ АНИМАЦИЯ */
            transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.8s;
            will-change: transform, opacity;
            backface-visibility: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateX(100%);
        }
        .content.active { 
            transform: translateX(0); 
            opacity: 1;
            visibility: visible;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 25px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateZ(0); 
        }

        .navbar { 
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.2); 
            display: flex; justify-content: space-around; padding: 25px; 
            border-top-left-radius: 30px; border-top-right-radius: 30px; 
            z-index: 10;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.4);
        }

        .nav-btn { cursor: pointer; color: #777; font-size: 0.9em; font-weight: 800; transition: all 0.4s ease; }
        .nav-btn.active-tab { color: #fff; font-size: 1.2em; text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div id="home" class="content active">
            <div class="glass">
                <div style="font-size: 0.7em; opacity: 0.6; letter-spacing: 2px;">БАЛАНС</div>
                <div style="font-size: 3em; margin-top: 5px;">0$</div>
            </div>
            <div class="glass">
                <h3>ЗАЧИСЛЕНИЯ</h3>
                <p style="opacity: 0.4;">История пока пуста...</p>
            </div>
        </div>

        <div id="leaderboard" class="content">
            <div class="glass">
                <h2>ЛИДЕРЫ</h2>
                <p>1. Игрок А — 1000$</p>
                <p>2. Игрок Б — 800$</p>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div id="btn-home" class="nav-btn active-tab" onclick="switchTab('home', 'btn-home')">ГЛАВНАЯ</div>
        <div id="btn-leaderboard" class="nav-btn" onclick="switchTab('leaderboard', 'btn-leaderboard')">ЛИДЕРБОРД</div>
    </nav>

    <script>
        function switchTab(tabId, btnId) {
            const currentActive = document.querySelector('.content.active');
            const targetTab = document.getElementById(tabId);
            if (currentActive === targetTab) return;

            currentActive.classList.remove('active');
            targetTab.classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(btnId).classList.add('active-tab');
        }

        // --- Canvas ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function setSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', setSize); setSize();
        
        for(let i = 0; i < 40; i++) {
            particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()*0.3-0.15, vy: Math.random()*0.3-0.15 });
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
            });
            for(let i=0; i<particles.length; i++) {
                for(let j=i+1; j<particles.length; j++) {
                    let d = Math.hypot(particles[i].x-particles[j].x, particles[i].y-particles[j].y);
                    if(d < 180) {
                        ctx.strokeStyle = "rgba(255,255,255," + (0.1*(1-d/180)) + ")";
                        ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
