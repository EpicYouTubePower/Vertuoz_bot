<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #0f0f0f; color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; 
        }
        
        /* Канвас на заднем плане */
        #bg-canvas { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            z-index: 0; 
            pointer-events: none;
        }

        .container { 
            position: relative; 
            z-index: 1; 
            padding: 20px; 
            height: calc(100vh - 80px); 
            overflow: hidden; 
        }
        
        .content { 
            position: absolute; 
            top: 20px; left: 20px; 
            width: calc(100% - 40px);
            opacity: 0;
            visibility: hidden;
            transform: translateX(100%);
            transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.8s;
            will-change: transform, opacity;
        }

        .content.active { 
            transform: translateX(0); 
            opacity: 1;
            visibility: visible;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 25px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .navbar { 
            position: fixed; 
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: rgba(20, 20, 20, 0.8); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            z-index: 100;
        }

        .nav-btn { 
            cursor: pointer; 
            color: #555; 
            font-size: 0.85em; 
            font-weight: 800; 
            transition: all 0.4s ease;
            flex: 1;
            text-align: center;
        }

        .nav-btn.active-tab { 
            color: #fff; 
            font-size: 1em; 
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); 
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div id="home" class="content active">
            <div class="glass">
                <div style="font-size: 0.7em; opacity: 0.6; letter-spacing: 2px;">ВАШ БАЛАНС</div>
                <div style="font-size: 3em; margin-top: 5px;">0$</div>
            </div>
            <div class="glass">
                <h3 style="margin: 0; font-size: 1.1em;">АКТИВНОСТЬ</h3>
                <p style="opacity: 0.4; font-size: 0.9em; margin-top: 10px;">Транзакции не найдены</p>
            </div>
        </div>

        <div id="leaderboard" class="content">
            <div class="glass" style="text-align: center; padding: 60px 20px;">
                <h2 style="margin: 0; opacity: 0.9; letter-spacing: 1px;">СКОРО ДОБАВИМ</h2>
                <p style="opacity: 0.4; margin-top: 15px; font-size: 0.9em;">Раздел находится в разработке</p>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div id="btn-home" class="nav-btn active-tab" onclick="switchTab('home', 'btn-home')">ГЛАВНАЯ</div>
        <div id="btn-leaderboard" class="nav-btn" onclick="switchTab('leaderboard', 'btn-leaderboard')">ЛИДЕРБОРД</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function switchTab(tabId, btnId) {
            const currentActive = document.querySelector('.content.active');
            const targetTab = document.getElementById(tabId);
            if (currentActive === targetTab) return;
            currentActive.classList.remove('active');
            targetTab.classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(btnId).classList.add('active-tab');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // --- ЛОГИКА ТОЧЕК (CANVAS) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: 2 // Размер точки
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; // Яркие точки
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Рисуем линии
            for(let i = 0; i < particles.length; i++) {
                for(let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if(dist < 150) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 * (1 - dist/150)})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        draw();

    </script>
</body>
</html>
